name: Generate Examples

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/**'
      - 'htmlskill/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Generate example outputs
      run: |
        cd examples
        python3 00-minimal.py
        python3 04-complete-with-output.py
        python3 05-product-landing.py

    - name: Create index page
      run: |
        cat > examples/output/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>HTMLskill Examples</title>
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                    max-width: 800px;
                    margin: 50px auto;
                    padding: 20px;
                    line-height: 1.6;
                }
                h1 { color: #667eea; }
                .example {
                    background: #f5f5f5;
                    padding: 20px;
                    margin: 20px 0;
                    border-radius: 8px;
                }
                a {
                    color: #667eea;
                    text-decoration: none;
                    font-weight: 600;
                }
                a:hover { text-decoration: underline; }
            </style>
        </head>
        <body>
            <h1>HTMLskill Live Examples</h1>
            <p>These pages were generated using HTMLskill - a Python-first HTML generation framework.</p>

            <div class="example">
                <h2>Minimal Example</h2>
                <p>The simplest possible HTMLskill page - 3 lines of code.</p>
                <a href="minimal.html">View Example →</a>
            </div>

            <div class="example">
                <h2>Complete Landing Page</h2>
                <p>Full-featured landing page with navbar, hero, features, and footer.</p>
                <a href="complete-landing.html">View Example →</a>
            </div>

            <div class="example">
                <h2>Product Landing Page</h2>
                <p>Professional SaaS product landing page with all sections.</p>
                <a href="product-landing.html">View Example →</a>
            </div>

            <hr style="margin: 40px 0;">
            <p>
                <a href="https://github.com/AIPMAndy/HTMLskill">← Back to GitHub</a> |
                <a href="https://github.com/AIPMAndy/HTMLskill#readme">Documentation</a>
            </p>
        </body>
        </html>
        EOF

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./examples/output
        publish_branch: gh-pages
